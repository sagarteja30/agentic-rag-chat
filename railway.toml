# Railway Configuration
# railway.toml

[metadata]
name = "agentic-rag"
description = "Production RAG with AI agents"

[build]
builder = "python"
buildCommand = "pip install -r requirements.txt"

[start]
command = "python agentic_rag.py"

[deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[variables]
SUPABASE_URL = ""
SUPABASE_SERVICE_ROLE_KEY = ""
GROQ_API_KEY = ""